<!-- Duolingo Lifetime Stats — standalone app for @EemanMajum -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duolingo · Lifetime Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  :root{
    --eel:#131F24; --surface:#1C2A31; --surface-2:#22343C; --edge:#0E171B;
    --line:#2E444E; --owl:#58CC02; --owl-dark:#43A047; --flame:#FF9600; --flame-2:#FFC800;
    --macaw:#1CB0F6; --macaw-dark:#1487C0; --cardinal:#FF4B6E; --beetle:#CE82FF;
    --ink:#FFFFFF; --hare:#8AA1AD; --hare-dim:#5E7681;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',system-ui,sans-serif;background:var(--eel);color:var(--ink);
    -webkit-font-smoothing:antialiased;min-height:100vh;padding:28px 16px 56px;}
  .app{max-width:820px;margin:0 auto;}

  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:26px;flex-wrap:wrap;}
  .avatar{width:54px;height:54px;border-radius:50%;background:var(--surface-2);object-fit:cover;
    border:3px solid var(--owl);flex:0 0 auto;}
  .who{display:flex;flex-direction:column;line-height:1.15;}
  .who h1{font-size:22px;font-weight:800;letter-spacing:-.01em;}
  .who span{font-size:14px;font-weight:700;color:var(--hare);}
  .spacer{flex:1 1 auto;}

  .btn{font-family:inherit;font-weight:800;font-size:15px;letter-spacing:.02em;text-transform:uppercase;
    color:#fff;background:var(--owl);border:none;border-radius:16px;padding:13px 22px;cursor:pointer;
    box-shadow:0 4px 0 0 var(--owl-dark);transition:transform .05s ease,box-shadow .05s ease;
    display:inline-flex;align-items:center;gap:9px;user-select:none;}
  .btn:hover{filter:brightness(1.05);}
  .btn:active{transform:translateY(4px);box-shadow:0 0 0 0 var(--owl-dark);}
  .btn[disabled]{background:var(--surface-2);box-shadow:0 4px 0 0 var(--edge);color:var(--hare);cursor:wait;}
  .btn svg{width:19px;height:19px;}
  .btn.spin svg{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 3D pushable card — the Duolingo signature edge */
  .card{background:var(--surface);border:2px solid var(--line);border-radius:18px;
    box-shadow:0 5px 0 0 var(--edge);padding:18px 20px;}

  .hero{display:flex;align-items:center;gap:22px;margin-bottom:18px;
    background:var(--surface);border:2px solid var(--line);border-radius:22px;
    box-shadow:0 6px 0 0 var(--edge);padding:22px 26px;}
  .flame{flex:0 0 auto;width:86px;height:86px;display:grid;place-items:center;}
  .flame svg{width:86px;height:86px;filter:drop-shadow(0 0 14px rgba(255,150,0,.35));
    animation:flick 2.4s ease-in-out infinite;transform-origin:50% 80%;}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-1deg)}50%{transform:scale(1.06) rotate(1deg)}}
  .hero-num{font-size:64px;font-weight:900;line-height:.9;letter-spacing:-.02em;}
  .hero-lbl{font-size:17px;font-weight:800;color:var(--flame);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}
  .hero-sub{font-size:14px;font-weight:700;color:var(--hare);margin-top:6px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:18px;}
  .stat{display:flex;flex-direction:column;gap:2px;}
  .stat-head{display:flex;align-items:center;gap:8px;color:var(--hare);font-weight:800;
    font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;}
  .stat-head svg{width:18px;height:18px;flex:0 0 auto;}
  .stat-val{font-size:30px;font-weight:900;letter-spacing:-.01em;margin-top:5px;}
  .stat-val small{font-size:15px;font-weight:800;color:var(--hare);}
  .stat-sub{font-size:13px;font-weight:700;color:var(--hare-dim);}
  .bar{height:9px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:9px;}
  .bar > i{display:block;height:100%;background:var(--macaw);border-radius:6px;}

  /* accent colors per stat icon */
  .i-flame{color:var(--flame)} .i-xp{color:var(--flame-2)} .i-lvl{color:var(--macaw)}
  .i-league{color:var(--beetle)} .i-gem{color:var(--cardinal)} .i-goal{color:var(--owl)}
  .i-cal{color:var(--macaw)} .i-lang{color:var(--owl)}

  .chart-card{margin-bottom:18px;}
  .chart-card h2{font-size:16px;font-weight:800;margin-bottom:4px;}
  .chart-card p{font-size:13px;font-weight:700;color:var(--hare);margin-bottom:14px;}
  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;font-weight:700;color:var(--hare);margin-bottom:10px;}
  .legend span{display:flex;align-items:center;gap:7px;}
  .swatch{width:12px;height:12px;border-radius:3px;}
  .chart-wrap{position:relative;width:100%;height:280px;}

  .status{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:var(--hare);
    padding:12px 16px;border-radius:14px;background:var(--surface);border:2px solid var(--line);}
  .status .dot{width:9px;height:9px;border-radius:50%;background:var(--owl);flex:0 0 auto;}
  .status.warn{color:var(--flame-2);border-color:#5a4410;} .status.warn .dot{background:var(--flame);}
  .status code{font-family:ui-monospace,monospace;background:var(--surface-2);padding:1px 6px;border-radius:6px;font-size:12px;color:var(--hare);}
  .badge{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;
    padding:3px 9px;border-radius:8px;background:var(--surface-2);color:var(--owl);}
  .badge.live{color:#fff;background:var(--owl);}

  @media (max-width:520px){
    .hero{flex-direction:column;text-align:center;gap:12px;padding:22px 18px;}
    .hero-num{font-size:54px;}
  }
  @media (prefers-reduced-motion:reduce){
    .flame svg{animation:none;} .btn.spin svg{animation:none;}
  }
</style>

<div class="app">
  <div class="topbar">
    <img id="avatar" class="avatar" alt="avatar">
    <div class="who">
      <h1 id="name">—</h1>
      <span id="handle">@—</span>
    </div>
    <div class="spacer"></div>
    <button id="refresh" class="btn" type="button" aria-label="Refresh lifetime stats from Duolingo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      <span id="btn-text">Refresh</span>
    </button>
  </div>

  <div class="hero">
    <div class="flame">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#FF9600" d="M12 2c.4 3.2 2.6 4.6 4 6.4 1.2 1.5 2 3.2 2 5.1A6 6 0 0 1 6 13.5c0-1.8.6-3 1.4-4 .2 1.4 1 2.1 1.8 2.1 1 0 1.3-.9 1-2.4C10.7 6.7 11 4 12 2Z"/><path fill="#FFC800" d="M12.2 10c.2 1.6 1.4 2.4 2.1 3.3.6.8 1 1.6 1 2.6a3.3 3.3 0 0 1-6.6 0c0-1 .4-1.8 1-2.5.1.8.6 1.2 1.1 1.2.6 0 .8-.5.6-1.4-.2-1 0-2.1 1.8-3.2Z"/></svg>
    </div>
    <div>
      <div class="hero-num" id="streak">—</div>
      <div class="hero-lbl">day streak</div>
      <div class="hero-sub" id="streak-sub">—</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="card chart-card">
    <h2>Recent activity</h2>
    <p id="chart-note">Daily XP from the latest sessions</p>
    <div class="legend">
      <span><i class="swatch" style="background:#58CC02"></i>Daily XP</span>
      <span><i class="swatch" style="background:#1CB0F6"></i>Cumulative XP</span>
    </div>
    <div class="chart-wrap">
      <canvas id="chart" role="img" aria-label="Daily XP per session with a cumulative total line"></canvas>
    </div>
  </div>

  <div id="status" class="status">
    <span class="dot"></span>
    <span id="status-text">Loading…</span>
    <span class="spacer" style="flex:1"></span>
    <span id="source" class="badge">snapshot</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
  "use strict";

  // ---- target account ----
  var USERNAME = "EemanMajum";
  var USER_ID  = 743286471;
  var DUO_URL  = "https://www.duolingo.com/users/" + USERNAME;

  // ---- CORS proxies tried in order (Duolingo blocks direct browser calls) ----
  var PROXIES = [
    function(u){ return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); },
    function(u){ return "https://corsproxy.io/?url=" + encodeURIComponent(u); },
    function(u){ return "https://thingproxy.freeboard.io/fetch/" + u; }
  ];

  // ---- baked-in snapshot so the app always renders, even offline ----
  var SNAPSHOT = {
    fullname:"Eeman Majumder", name:"Eeman Majumder", username:"EemanMajum",
    avatar:"//simg-ssl.duolingo.com/ssr-avatars/743286471/SSR-vhK0mj1tzA",
    picture:"//simg-ssl.duolingo.com/ssr-avatars/743286471/SSR-vhK0mj1tzA",
    totalXp:5384, creationDate:1614608456, site_streak:128, streak:128,
    learning_language:"ja", learning_language_string:"Japanese",
    daily_goal:10, rupees:9,
    language_data:{ ja:{ level:13, level_percent:44, level_left:616, next_level:14, points:5384 } },
    streakData:{ currentStreak:{length:128}, longestStreak:{length:128, achieveDate:"2026-03-02"}, xpGoal:10 },
    league:{ tier:5, stats:{ number_one_finishes:1, number_two_finishes:1, top_three_finishes:2 } },
    vocab_size:{ all:0 },
    languages:[{language:"ja", points:5384}],
    calendar:[
      {datetime:1780050912000,improvement:22},{datetime:1780157561000,improvement:27},
      {datetime:1780238986000,improvement:20},{datetime:1780323304000,improvement:24},
      {datetime:1780408509000,improvement:23},{datetime:1780487822000,improvement:25},
      {datetime:1780574317000,improvement:20},{datetime:1780668063000,improvement:24},
      {datetime:1780751066000,improvement:28},{datetime:1780850547000,improvement:28},
      {datetime:1780932063000,improvement:20},{datetime:1781016594000,improvement:34},
      {datetime:1781096145000,improvement:28},{datetime:1781194009000,improvement:30},
      {datetime:1781278464000,improvement:29}
    ]
  };

  var LEAGUES = ["Bronze","Silver","Gold","Sapphire","Ruby","Emerald","Amethyst","Pearl","Obsidian","Diamond"];

  // ---- helpers ----
  var $ = function(id){ return document.getElementById(id); };
  function nf(n){ return Number(n||0).toLocaleString("en-US"); }
  function fmtDate(ms){ return new Date(ms).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
  function daysBetween(ms){ return Math.floor((Date.now()-ms)/86400000); }
  function ageStr(ms){
    var s=(Date.now()-ms)/1000, y=Math.floor(s/31557600); s-=y*31557600;
    var mo=Math.floor(s/2629800);
    if(y>0) return y+(y===1?" yr":" yrs")+(mo>0?" "+mo+"mo":"");
    return mo+(mo===1?" month":" months");
  }

  function extract(d){
    var lang = (d.language_data && d.language_data[d.learning_language]) || {};
    var sd = d.streakData || {};
    var lg = d.league || {}; var ls = lg.stats || {};
    var created = d.creationDate ? d.creationDate*1000 : null;
    return {
      name: d.fullname || d.name || d.username || USERNAME,
      handle: d.username || USERNAME,
      avatar: (d.avatar || d.picture || "").replace(/^\/\//,"https://"),
      totalXp: d.totalXp != null ? d.totalXp : (lang.points || 0),
      created: created,
      curStreak: d.site_streak != null ? d.site_streak : (d.streak != null ? d.streak : ((sd.currentStreak||{}).length || 0)),
      maxStreak: ((sd.longestStreak||{}).length) || d.streak || 0,
      maxAchieved: (sd.longestStreak||{}).achieveDate || null,
      level: lang.level || 0,
      levelPct: lang.level_percent || 0,
      levelLeft: lang.level_left || 0,
      nextLevel: lang.next_level || ((lang.level||0)+1),
      course: d.learning_language_string || "Language",
      tier: (lg.tier != null) ? lg.tier : null,
      firsts: ls.number_one_finishes || 0,
      topThree: ls.top_three_finishes || 0,
      gems: d.rupees != null ? d.rupees : 0,
      goal: d.daily_goal != null ? d.daily_goal : (sd.xpGoal || 0),
      langs: (d.languages||[]).filter(function(l){return (l.points||0)>0;}).length || 1,
      vocab: (d.vocab_size||{}).all,
      cal: d.calendar || []
    };
  }

  function statCard(opts){
    var sub = opts.sub ? '<div class="stat-sub">'+opts.sub+'</div>' : '';
    var bar = (opts.pct != null) ? '<div class="bar"><i style="width:'+opts.pct+'%"></i></div>' : '';
    return '<div class="card stat">'+
      '<div class="stat-head"><span class="i-'+opts.icon+'">'+ICONS[opts.icon]+'</span>'+opts.label+'</div>'+
      '<div class="stat-val">'+opts.val+'</div>'+ bar + sub +'</div>';
  }

  var ICONS = {
    flame:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c.4 3 2.5 4.4 3.8 6.1C16.9 9.5 17.6 11 17.6 13A5.6 5.6 0 0 1 6.4 13c0-1.6.5-2.8 1.3-3.8.2 1.3.9 2 1.6 2 .9 0 1.2-.8.9-2.2C10.8 6.6 11 4 12 2Z"/></svg>',
    xp:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 10-13h-6l0-7z"/></svg>',
    lvl:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>',
    league:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h12v3a6 6 0 0 1-12 0V4Z"/><path d="M4 5H2.5v.5A3.5 3.5 0 0 0 6 9M20 5h1.5v.5A3.5 3.5 0 0 1 18 9"/><rect x="10" y="13" width="4" height="4"/><rect x="8" y="19" width="8" height="2" rx="1"/></svg>',
    gem:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3h12l3 6-9 12L3 9l3-6Z"/></svg>',
    goal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>',
    cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M3 9.5h18M8 3v4M16 3v4"/></svg>',
    lang:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>'
  };

  var chart;
  function drawChart(cal){
    if(typeof Chart === "undefined"){ document.querySelector(".chart-card").style.display="none"; return; }
    var labels = cal.map(function(c){ return new Date(c.datetime).toLocaleDateString("en-GB",{day:"numeric",month:"short"}); });
    var daily  = cal.map(function(c){ return c.improvement; });
    var run=0, cum = daily.map(function(v){ run+=v; return run; });
    var avg = daily.length ? (daily.reduce(function(a,b){return a+b;},0)/daily.length) : 0;
    $("chart-note").textContent = "Daily XP from the latest "+daily.length+" sessions · avg "+avg.toFixed(1)+" XP/day";
    if(chart) chart.destroy();
    chart = new Chart($("chart"), {
      data:{ labels:labels, datasets:[
        {type:"bar", label:"Daily XP", data:daily, yAxisID:"y", order:2,
         backgroundColor:"rgba(88,204,2,0.85)", borderColor:"#58CC02", borderWidth:0, borderRadius:6, maxBarThickness:26},
        {type:"line", label:"Cumulative XP", data:cum, yAxisID:"y1", order:1,
         borderColor:"#1CB0F6", backgroundColor:"#1CB0F6", borderWidth:3, borderDash:[6,4],
         pointRadius:0, pointHoverRadius:4, tension:.25}
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{ legend:{display:false},
          tooltip:{ backgroundColor:"#22343C", borderColor:"#2E444E", borderWidth:1,
            titleColor:"#fff", bodyColor:"#cfe", padding:10,
            callbacks:{ label:function(c){ return c.dataset.label+": "+Math.round(c.parsed.y)+" XP"; } } } },
        scales:{
          x:{ grid:{display:false}, ticks:{color:"#8AA1AD",font:{family:"Nunito",weight:"700",size:11},maxRotation:45,minRotation:45} },
          y:{ position:"left", beginAtZero:true, suggestedMax:40, grid:{color:"rgba(255,255,255,.07)"},
              ticks:{color:"#8AA1AD",font:{family:"Nunito",weight:"700",size:11}} },
          y1:{ position:"right", beginAtZero:true, grid:{drawOnChartArea:false},
               ticks:{color:"#8AA1AD",font:{family:"Nunito",weight:"700",size:11}} }
        }
      }
    });
  }

  function render(d){
    var x = extract(d);
    $("avatar").src = x.avatar || "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
    $("name").textContent = x.name;
    $("handle").textContent = "@" + x.handle;
    $("streak").textContent = nf(x.curStreak);
    $("streak-sub").textContent = "Longest ever " + nf(x.maxStreak) + " days" +
      (x.maxAchieved ? " · set " + fmtDate(new Date(x.maxAchieved).getTime()) : "");

    var tierName = (x.tier != null && LEAGUES[x.tier]) ? LEAGUES[x.tier] : (x.tier != null ? "Tier "+x.tier : "—");
    var memberSub = x.created ? "Since " + fmtDate(x.created) + " · " + nf(daysBetween(x.created)) + " days" : "";

    var cards = [
      statCard({icon:"xp",    label:"Total XP",     val:nf(x.totalXp),                          sub:"All-time, "+x.course}),
      statCard({icon:"cal",   label:"Member for",   val:x.created?ageStr(x.created):"—",         sub:memberSub}),
      statCard({icon:"flame", label:"Longest streak",val:nf(x.maxStreak)+'<small> days</small>', sub:x.maxAchieved?"Reached "+fmtDate(new Date(x.maxAchieved).getTime()):""}),
      statCard({icon:"lvl",   label:x.course+" level", val:nf(x.level), pct:x.levelPct,          sub:x.levelPct+"% · "+nf(x.levelLeft)+" XP to lvl "+x.nextLevel}),
      statCard({icon:"league",label:"League",       val:tierName,                               sub:x.firsts+"× 1st · "+x.topThree+" top-3 finishes"}),
      statCard({icon:"gem",   label:"Gems",         val:nf(x.gems),                             sub:"Daily goal "+nf(x.goal)+" XP"})
    ];
    $("grid").innerHTML = cards.join("");
    drawChart(x.cal);
  }

  function setStatus(text, source, warn){
    $("status-text").innerHTML = text;
    $("status").className = "status" + (warn ? " warn" : "");
    if(source){ $("source").textContent = source; $("source").className = "badge" + (source==="live"?" live":""); }
  }

  function fetchJSON(url){
    var ctrl = new AbortController();
    var t = setTimeout(function(){ ctrl.abort(); }, 9000);
    return fetch(url, {signal:ctrl.signal, headers:{Accept:"application/json"}})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
      .then(function(txt){ clearTimeout(t); return JSON.parse(txt); });
  }

  function refresh(){
    var btn = $("refresh");
    btn.disabled = true; btn.classList.add("spin");
    $("btn-text").textContent = "Refreshing";
    setStatus("Contacting Duolingo…", null, false);

    var i = 0;
    (function tryNext(){
      if(i >= PROXIES.length){
        btn.disabled = false; btn.classList.remove("spin"); $("btn-text").textContent = "Refresh";
        setStatus('Couldn\'t reach Duolingo just now — showing your saved snapshot. Live refresh needs a working CORS proxy; try again, or edit <code>PROXIES</code> in the file.', "snapshot", true);
        return;
      }
      var target = PROXIES[i++](DUO_URL);
      fetchJSON(target).then(function(data){
        if(!data || (!data.username && !data.language_data)) throw new Error("unexpected payload");
        render(data);
        btn.disabled = false; btn.classList.remove("spin"); $("btn-text").textContent = "Refresh";
        setStatus("Updated " + new Date().toLocaleString("en-GB",{hour:"2-digit",minute:"2-digit",day:"numeric",month:"short"}) + " · live from Duolingo", "live", false);
      }).catch(function(){ tryNext(); });
    })();
  }

  // ---- boot ----
  render(SNAPSHOT);
  setStatus("Showing saved snapshot — tap Refresh to pull live lifetime stats", "snapshot", false);
  $("refresh").addEventListener("click", refresh);
})();
</script>
